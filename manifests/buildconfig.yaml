apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: my-swarm-demo
spec:
  source:
    type: Git
    git:
      uri: https://github.com/rukevweubio/01-Devops-Dockerswarm.git
    contextDir: bitcoin-app 
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: my-swarm-demo:latest