apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitcoin-app-1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bitcoin-app
  template:
    metadata:
      labels:
        app: bitcoin-app
    spec:
      containers:
      - name: bitcoin
        image: quay.io/ubiowororuki/bitcoin-app
        ports:
        - containerPort: 8080
---
