name: Build and Deploy to OpenShift

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: mybitcoin-app
  DOCKERHUB_USER: rukevweubio
  QUAY_USER: ubiowororuki+newaccount
  OPENSHIFT_DEPLOY_NAME: bitcoin-app

jobs:

  lint-workflow:
    name: Lint Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_on_error: true

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: lint-workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build starts only if lint passes
        run: echo "Lint passed — starting build"

      # Node setup (remove if app is not NodeJS)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Build App
        working-directory: bitcoin-app
        run: |
          npm ci
          npm run build

      - name: Build Docker Image
        working-directory: bitcoin-app
        run: |
          docker build -t "$IMAGE_NAME:v1.00" .

   
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ env.QUAY_USER}}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Tag and Push Images
        run: |
          docker tag "$IMAGE_NAME:v1.00" "$DOCKERHUB_USER/$IMAGE_NAME:latest"
          docker tag "$IMAGE_NAME:v1.00" "quay.io/$QUAY_USER/$IMAGE_NAME:latest"

          docker push "$DOCKERHUB_USER/$IMAGE_NAME:latest"
          docker push "quay.io/$QUAY_USER/$IMAGE_NAME:latest"

      - name: Install OpenShift CLI
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xvf oc.tar.gz
          sudo mv oc /usr/local/bin/
          oc version

      - name: OpenShift Login
        run: |
          oc login "${{ secrets.OPENSHIFT_API }}" \
            --token="${{ secrets.OPENSHIFT_TOKEN }}" \
            --insecure-skip-tls-verify=true

      - name: Select Project
        run: oc project "${{ secrets.OPENSHIFT_NAMESPACE }}"

      - name: Deploy Image to OpenShift
        run: |
          oc set image deployment/"$OPENSHIFT_DEPLOY_NAME" \
          "$OPENSHIFT_DEPLOY_NAME"="quay.io/$QUAY_USER/$IMAGE_NAME:latest"

      - name: Ensure Service Port (optional safety)
        run: |
          oc patch svc/"$OPENSHIFT_DEPLOY_NAME" \
          -p '{"spec":{"ports":[{"port":8080,"targetPort":8080,"protocol":"TCP","name":"8080-tcp"}]}}' || true

      - name: Wait for rollout
        run: |
          oc rollout status deployment/"$OPENSHIFT_DEPLOY_NAME"