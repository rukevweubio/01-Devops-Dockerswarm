apiVersion: external-secrets.io/v1 
kind: ExternalSecret
metadata:
  name: vault-minio-backend
  namespace: velero
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: minio-creds-k8s
  data:
  - secretKey: rootUser
    remoteRef:
      key: creds
      property: rootUser
  - secretKey: rootPassword
    remoteRef:
      key: creds
      property: rootPassword