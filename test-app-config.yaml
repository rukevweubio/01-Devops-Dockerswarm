apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-test-app
  namespace: argocd
  annotations:
    # Watch your Docker Hub repo
    argocd-image-updater.argoproj.io/image-list: my-app=docker.io/rukevweubio/my-app:latest
    # Tell it to use the "digest" strategy for the 'latest' tag
    argocd-image-updater.argoproj.io/my-app.update-strategy: digest
    # Enable Git Write-back using the secret we created in Phase 2
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
spec:
  project: default
  source:
    repoURL: https://github.com/rukevweubio/01-Devops-Dockerswarm.git
    targetRevision: main
    path: apps/
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
