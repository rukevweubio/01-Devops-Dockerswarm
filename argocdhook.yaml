apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitcoin-practice-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rukevweubio/01-Devops-Dockerswarm.git
    targetRevision: main
    path: argocd-hook 
  destination:
    server: https://kubernetes.default.svc
    # The namespace where your Bitcoin app will live
    namespace: todo 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true 