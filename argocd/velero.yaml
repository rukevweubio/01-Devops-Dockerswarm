apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: velero
spec:
  provider:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "minio/data" 
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          key: "token"